<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>敵との遭遇 | Dungeon RPG</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="panel battle-panel">
    <p class="eyebrow">ENEMY ENCOUNTER</p>
    <h1><span th:text="${enemy.name}">Goblin</span>が現れた！</h1>

    <section class="enemy-card">
        <div><span>HP</span><strong th:text="${enemy.hp}">18</strong></div>
        <div><span>ATTACK</span><strong th:text="${enemy.attack}">6</strong></div>
        <div><span>DEFENSE</span><strong th:text="${enemy.defense}">2</strong></div>
        <div><span>EXP</span><strong th:text="${enemy.experience}">8</strong></div>
    </section>

    <section class="battle-player-status">
        <span th:text="${gameState.player.name}">冒険者</span>
        <strong>HP <span th:text="${gameState.player.hp}">30</span> / <span th:text="${gameState.player.maxHp}">30</span></strong>
    </section>

    <form class="battle-action" th:action="@{/battle/attack}" method="post">
        <button type="submit">攻撃</button>
    </form>

    <section class="battle-log" aria-label="戦闘ログ" aria-live="polite">
        <h2>戦闘ログ</h2>
        <p th:each="log : ${gameState.battleLog}" th:text="${log}">戦闘ログ</p>
    </section>
</main>
</body>
</html>
