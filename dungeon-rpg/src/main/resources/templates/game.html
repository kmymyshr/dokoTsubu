<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>探索開始 | Dungeon RPG</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="panel game-panel">
    <p class="eyebrow">DUNGEON EXPLORATION</p>
    <h1><span th:text="${gameState.player.name}">冒険者</span>の探索</h1>

    <section class="status-grid" aria-label="プレイヤー情報">
        <div><span>LEVEL</span><strong th:text="${gameState.player.level}">1</strong></div>
        <div><span>HP</span><strong><span th:text="${gameState.player.hp}">30</span> / <span th:text="${gameState.player.maxHp}">30</span></strong></div>
        <div><span>ATTACK</span><strong th:text="${gameState.player.attack}">8</strong></div>
        <div><span>DEFENSE</span><strong th:text="${gameState.player.defense}">4</strong></div>
        <div><span>EXP</span><strong th:text="${gameState.player.experience}">0</strong></div>
    </section>

    <div class="location">
        <p>現在位置：(<span th:text="${gameState.dungeonX}">0</span>, <span th:text="${gameState.dungeonY}">0</span>)</p>
        <p>向き：<strong th:text="${gameState.direction.displayName}">北</strong></p>
    </div>

    <p class="action-message" role="status" aria-live="polite"
       th:if="${actionMessage}" th:text="${actionMessage}"></p>

    <section class="controls" aria-label="移動操作">
        <form th:action="@{/game/turn-left}" method="post">
            <button type="submit">左を向く</button>
        </form>
        <form th:action="@{/game/move}" method="post">
            <button type="submit">前進</button>
        </form>
        <form th:action="@{/game/turn-right}" method="post">
            <button type="submit">右を向く</button>
        </form>
    </section>

    <form class="town-return" th:action="@{/town/return}" method="post">
        <button type="submit">街に戻る</button>
    </form>

    <div class="dungeon-message">
        <p>冷たい風が、迷宮の奥から吹いてくる。</p>
        <p>冒険はここから始まる……。</p>
    </div>

    <a class="secondary-button" th:href="@{/}">トップへ戻る</a>
</main>
</body>
</html>
