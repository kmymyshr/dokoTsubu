<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>街 | Dungeon RPG</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="panel town-panel">
    <p class="eyebrow">ADVENTURER'S TOWN</p>
    <h1>はじまりの街</h1>
    <p><span th:text="${gameState.player.name}">冒険者</span>を穏やかな街の灯りが迎える。</p>

    <section class="status-grid">
        <div>
            <span>HP</span>
            <strong><span th:text="${gameState.player.hp}">30</span> / <span th:text="${gameState.player.maxHp}">30</span></strong>
        </div>
    </section>

    <p class="action-message" role="status" aria-live="polite"
       th:if="${townMessage}" th:text="${townMessage}"></p>

    <section class="town-actions">
        <form th:action="@{/town/rest}" method="post">
            <button type="submit">宿屋で休む</button>
        </form>
        <form th:action="@{/town/enter}" method="post">
            <button type="submit">ダンジョンに入る</button>
        </form>
    </section>
</main>
</body>
</html>
