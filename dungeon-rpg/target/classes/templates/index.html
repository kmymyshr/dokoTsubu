<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dungeon RPG</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="panel">
    <p class="eyebrow">A SMALL ADVENTURE</p>
    <h1>Dungeon RPG</h1>
    <p>名もなき地下迷宮へ、一歩を踏み出そう。</p>

    <form class="start-form" th:action="@{/game/start}" method="post">
        <label for="playerName">プレイヤー名</label>
        <input id="playerName" name="playerName" type="text"
               maxlength="20" autocomplete="off" placeholder="例：アレン">
        <p class="error" th:if="${errorMessage}" th:text="${errorMessage}"></p>
        <button type="submit">ゲーム開始</button>
    </form>
</main>
</body>
</html>
