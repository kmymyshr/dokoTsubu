spring:
  application:
    name: dokoTsubu
  datasource:
    url: ${db.url:${DB_URL:jdbc:h2:tcp://localhost/~/dokoTsubu}}
    username: ${db.user:${DB_USER:sa}}
    password: ${db.password:${DB_PASSWORD:}}
    hikari:
      pool-name: dokoTsubu-db
      maximum-pool-size: ${db.maximumPoolSize:${DB_MAXIMUM_POOL_SIZE:10}}
      minimum-idle: 0
      connection-timeout: 10000
      idle-timeout: 60000
      max-lifetime: 1800000
  flyway:
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}
    baseline-version: 1
    baseline-description: Existing schema before Flyway

server:
  port: ${PORT:8080}
  # Phase23: Renderなどのリバースプロキシ配下でHTTPS/Host情報を正しく扱うため、環境変数で調整できるようにする。
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:native}
  servlet:
    # Phase23: ローカルは従来どおり /dokoTsubu、デプロイ先では必要に応じてルート配信へ切り替えられるようにする。
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/dokoTsubu}
    session:
      cookie:
        http-only: true
        same-site: lax
